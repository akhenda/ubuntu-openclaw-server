---
- name: Apply baseline, hardening, and optional OpenClaw install
  hosts: all
  become: true
  gather_facts: true
  roles:
    - role: base
      tags:
        - base
    - role: hardening
      tags:
        - hardening
    - role: cloudflare
      tags:
        - cloudflare
      when: cloudflare_enable | default(false) | bool
    - role: traefik
      tags:
        - traefik
      when: traefik_enable | default(false) | bool
    - role: openclaw
      tags:
        - openclaw
      when: openclaw_enable | default(false) | bool
