---
- name: Apply baseline, hardening, and optional OpenClaw install
  hosts: all
  become: true
  gather_facts: true
  module_defaults:
    ansible.builtin.apt:
      lock_timeout: "{{ apt_lock_timeout | default(300) }}"
  roles:
    - role: base
      tags:
        - base
    - role: oh_my_zsh
      tags:
        - shell
        - oh_my_zsh
      when: oh_my_zsh_enable | default(false) | bool
    - role: hardening
      tags:
        - hardening
    - role: cloudflare
      tags:
        - cloudflare
      when: cloudflare_enable | default(false) | bool
    - role: socket_proxy
      tags:
        - socket_proxy
      when: socket_proxy_enable | default(false) | bool
    - role: traefik
      tags:
        - traefik
      when: traefik_enable | default(false) | bool
    - role: homepage
      tags:
        - homepage
      when: homepage_enable | default(false) | bool
    - role: openclaw
      tags:
        - openclaw
      when: openclaw_enable | default(false) | bool
