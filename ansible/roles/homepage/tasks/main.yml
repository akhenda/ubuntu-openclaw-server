---
- name: Skip Homepage hub deployment when disabled
  ansible.builtin.debug:
    msg: "homepage_enable is false; skipping Homepage hub setup."
  when: not (homepage_enable | bool)

- name: Deploy Homepage hub behind Traefik
  when: homepage_enable | bool
  block:
    - name: Validate Homepage host configuration
      ansible.builtin.assert:
        that:
          - homepage_host | length > 0
        fail_msg: "Set homepage_host (or homepage_domain) when homepage_enable=true."

    - name: Ensure docker service is running for Homepage deployment
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started

    - name: Ensure Homepage stack directories exist
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: root
        group: root
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ homepage_stack_root }}", mode: "0755" }
        - { path: "{{ homepage_config_dir }}", mode: "0755" }

    - name: Ensure shared proxy docker network exists
      community.docker.docker_network:
        name: "{{ homepage_network_name }}"
        state: present

    - name: Render Homepage compose stack
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ homepage_stack_root }}/{{ homepage_compose_filename }}"
        owner: root
        group: root
        mode: "0644"

    - name: Render default Homepage settings config
      ansible.builtin.template:
        src: settings.yaml.j2
        dest: "{{ homepage_config_dir }}/settings.yaml"
        owner: root
        group: root
        mode: "0644"
      when: homepage_manage_default_config | bool

    - name: Render default Homepage services config
      ansible.builtin.copy:
        dest: "{{ homepage_config_dir }}/services.yaml"
        owner: root
        group: root
        mode: "0644"
        content: |
          ---
          - Infrastructure:
              - OpenClaw:
                  href: "https://{{ homepage_host }}"
                  description: "OpenClaw entrypoint (route when configured)"
      when: homepage_manage_default_config | bool

    - name: Render default Homepage bookmarks config
      ansible.builtin.copy:
        dest: "{{ homepage_config_dir }}/bookmarks.yaml"
        owner: root
        group: root
        mode: "0644"
        content: |
          ---
          - Docs:
              - Repository:
                  - abbr: GIT
                    href: "https://github.com/openclaw/openclaw-ansible"
      when: homepage_manage_default_config | bool

    - name: Render default Homepage widgets config
      ansible.builtin.copy:
        dest: "{{ homepage_config_dir }}/widgets.yaml"
        owner: root
        group: root
        mode: "0644"
        content: |
          ---
          - resources:
              cpu: true
              memory: true
              disk: /
          - search:
              provider: duckduckgo
              target: _blank
      when: homepage_manage_default_config | bool

    - name: Render default Homepage docker config
      ansible.builtin.copy:
        dest: "{{ homepage_config_dir }}/docker.yaml"
        owner: root
        group: root
        mode: "0644"
        content: |
          ---
          my-docker:
            host: unix:///var/run/docker.sock
      when: homepage_manage_default_config | bool

    - name: Deploy Homepage stack via docker compose
      community.docker.docker_compose_v2:
        project_src: "{{ homepage_stack_root }}"
        files:
          - "{{ homepage_compose_filename }}"
        state: present
        pull: missing

    - name: Verify Homepage container is running
      community.docker.docker_container_info:
        name: "{{ homepage_container_name }}"
      register: homepage_container_info

    - name: Assert Homepage container health
      ansible.builtin.assert:
        that:
          - homepage_container_info.exists
          - homepage_container_info.container.State.Running | bool
        fail_msg: "Homepage container is not running as expected."

    - name: Print Homepage next steps
      ansible.builtin.debug:
        msg:
          - "Homepage hub deployed at host: {{ homepage_host }}"
          - "Ensure DNS points {{ homepage_host }} to your Traefik entrypoint and Cloudflare Access policy protects it."
