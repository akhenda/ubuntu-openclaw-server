---
homepage_enable: false

homepage_stack_root: /opt/homepage
homepage_config_dir: "{{ homepage_stack_root }}/config"
homepage_compose_filename: docker-compose.yml

homepage_image: ghcr.io/gethomepage/homepage:latest
homepage_container_name: homepage
homepage_restart_policy: unless-stopped
homepage_container_port: 3000

homepage_domain: "{{ traefik_domain | default('') }}"
homepage_host: "{{ ('hub.' ~ homepage_domain) if (homepage_domain | length > 0) else '' }}"
homepage_network_name: "{{ traefik_network_name | default('proxy') }}"
homepage_use_socket_proxy: "{{ socket_proxy_enable | default(false) | bool }}"
homepage_docker_proxy_endpoint: >-
  {{
    (socket_proxy_endpoint | default('http://docker-socket-proxy:2375'))
    if (homepage_use_socket_proxy | bool)
    else 'unix:///var/run/docker.sock'
  }}

homepage_manage_default_config: true
homepage_title: OpenClaw Hub
homepage_description: Services dashboard behind Traefik + Cloudflare Access
