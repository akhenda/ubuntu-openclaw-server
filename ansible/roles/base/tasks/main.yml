---
- name: Derive effective firewall management mode
  ansible.builtin.set_fact:
    base_effective_manage_firewall: "{{ base_manage_firewall and not (openclaw_enable | default(false) | bool) }}"
    base_effective_host_ip: >-
      {{
        (base_host_ip | trim)
        if (base_host_ip | default('') | trim | length > 0)
        else (ansible_default_ipv4.address | default('127.0.0.1', true))
      }}

- name: Refresh apt cache and apply distro upgrades
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
    upgrade: "{{ base_apt_upgrade }}"

- name: Install baseline packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - git
      - ufw
      - unattended-upgrades
    state: present

- name: Build list of admin authorized SSH keys
  ansible.builtin.set_fact:
    base_admin_authorized_keys: >-
      {{
        (
          (base_admin_ssh_public_keys | default([]))
          + ([base_admin_ssh_public_key] if (base_admin_ssh_public_key | default('') | trim | length > 0) else [])
        )
        | map('trim')
        | reject('equalto', '')
        | unique
        | list
      }}

- name: Ensure admin SSH keys are provided when required
  ansible.builtin.assert:
    that:
      - base_admin_authorized_keys | length > 0
    fail_msg: "Set INFRA_ADMIN_SSH_PUBLIC_KEY (or base_admin_ssh_public_keys) before running."
  when:
    - base_manage_admin_user | bool
    - base_require_admin_ssh_key | bool

- name: Configure admin account
  when: base_manage_admin_user | bool
  block:
    - name: Ensure sudo group exists
      ansible.builtin.group:
        name: sudo
        state: present

    - name: Ensure sudo group has sudo privileges
      ansible.builtin.lineinfile:
        path: /etc/sudoers
        state: present
        regexp: "^%sudo"
        line: "%sudo ALL=(ALL:ALL) ALL"
        validate: "/usr/sbin/visudo -cf %s"

    - name: Ensure admin user exists
      ansible.builtin.user:
        name: "{{ base_admin_user }}"
        groups: "{{ base_admin_groups }}"
        append: true
        state: present
        shell: /bin/bash
        create_home: true
        password: >-
          {{
            base_admin_password_hash
            if (base_admin_password_hash | length > 0)
            else ((base_admin_password | password_hash('sha512')) if (base_admin_password | length > 0) else omit)
          }}
        password_lock: "{{ (base_admin_password_hash | length == 0) and (base_admin_password | length == 0) }}"

    - name: Ensure admin authorized SSH keys
      ansible.posix.authorized_key:
        user: "{{ base_admin_user }}"
        key: "{{ item }}"
        state: present
      loop: "{{ base_admin_authorized_keys }}"

- name: Remove default ubuntu user
  ansible.builtin.user:
    name: ubuntu
    state: absent
    remove: true
    force: true
  when:
    - base_remove_ubuntu_user | bool
    - base_admin_user != "ubuntu"

- name: Install fail2ban package when enabled
  ansible.builtin.apt:
    name: fail2ban
    state: present
  when: base_install_fail2ban | bool

- name: Set system timezone
  community.general.timezone:
    name: "{{ base_timezone }}"
  when: base_set_timezone | bool

- name: Set hostname from configuration
  ansible.builtin.hostname:
    name: "{{ base_fqdn }}"
  when: base_fqdn | length > 0

- name: Ensure hostname mapping exists in /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    insertafter: "^127\\.0\\.0\\.1\\slocalhost"
    line: "{{ base_effective_host_ip }} {{ base_fqdn }} {{ base_fqdn.split('.')[0] }}"
    state: present
  when: base_fqdn | length > 0

- name: Remove default 127.0.1.1 hosts entry
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "^127\\.0\\.1\\.1"
    state: absent
  when: base_fqdn | length > 0

- name: Install custom MOTD status script
  ansible.builtin.template:
    src: motd-99-openclaw-status.j2
    dest: /etc/update-motd.d/99-openclaw-status
    owner: root
    group: root
    mode: "0755"
  when: base_configure_motd | bool

- name: Configure unattended-upgrades behavior
  ansible.builtin.template:
    src: unattended-upgrades-50unattended.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: "0644"
  when: base_enable_unattended_upgrades | bool

- name: Ensure unattended-upgrades periodic execution is enabled
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
  when: base_enable_unattended_upgrades | bool

- name: Configure fail2ban jail.local for sshd
  ansible.builtin.template:
    src: fail2ban-jail-local.conf.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  when: base_install_fail2ban | bool
  notify: Restart fail2ban

- name: Ensure fail2ban service is enabled and running
  ansible.builtin.service:
    name: fail2ban
    enabled: true
    state: started
  when:
    - base_install_fail2ban | bool
    - ansible_service_mgr == "systemd"

- name: Configure ufw defaults and SSH rules
  when: base_effective_manage_firewall | bool
  block:
    - name: Set ufw default incoming policy to deny
      community.general.ufw:
        direction: incoming
        policy: deny

    - name: Set ufw default outgoing policy to allow
      community.general.ufw:
        direction: outgoing
        policy: allow

    - name: Block legacy SSH port 22 when not in allowed list
      community.general.ufw:
        rule: deny
        port: "22"
        proto: tcp
      when: "'22' not in base_allowed_ssh_ports"

    - name: Allow SSH ports
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: "{{ base_allowed_ssh_ports }}"

    - name: Enable ufw
      community.general.ufw:
        state: enabled
