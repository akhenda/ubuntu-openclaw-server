---
- name: Restart fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: restarted
  when: ansible_service_mgr == "systemd"

- name: Reload ufw
  ansible.builtin.command:
    argv:
      - ufw
      - reload
  changed_when: false

- name: Reload ssh
  ansible.builtin.service:
    name: ssh
    state: reloaded
  when: ansible_service_mgr == "systemd"
