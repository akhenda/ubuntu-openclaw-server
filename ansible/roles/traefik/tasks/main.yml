---
- name: Skip Traefik setup when disabled
  ansible.builtin.debug:
    msg: "traefik_enable is false; skipping Traefik setup."
  when: not (traefik_enable | bool)

- name: Configure Traefik foundation
  when: traefik_enable | bool
  block:
    - name: Derive effective Traefik firewall management mode
      ansible.builtin.set_fact:
        traefik_effective_manage_firewall: >-
          {{
            (traefik_manage_firewall_rules | bool)
            and (base_manage_firewall | default(true) | bool)
            and not (openclaw_enable | default(false) | bool)
          }}

    - name: Validate dashboard hostname when dashboard is enabled
      ansible.builtin.assert:
        that:
          - traefik_dashboard_host | length > 0
        fail_msg: "Set traefik_dashboard_host (or traefik_domain) when traefik_dashboard_enable=true."
      when: traefik_dashboard_enable | bool

    - name: Install Docker packages required for Traefik stack
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-plugin
          - python3-docker
        state: present
        update_cache: true
      when: traefik_install_docker | bool

    - name: Ensure docker service is enabled and running
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started

    - name: Ensure Traefik admin user can run docker without sudo
      ansible.builtin.user:
        name: "{{ traefik_admin_user }}"
        groups: docker
        append: true
      when:
        - traefik_manage_user_group | bool
        - traefik_admin_user | length > 0

    - name: Ensure Traefik stack directories exist
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: root
        group: root
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ traefik_stack_root }}", mode: "0755" }
        - { path: "{{ traefik_dynamic_dir }}", mode: "0755" }
        - { path: "{{ traefik_certs_dir }}", mode: "0700" }

    - name: Render Traefik static configuration
      ansible.builtin.template:
        src: traefik.yml.j2
        dest: "{{ traefik_stack_root }}/{{ traefik_config_filename }}"
        owner: root
        group: root
        mode: "0644"

    - name: Render Traefik dynamic TLS configuration
      ansible.builtin.template:
        src: tls.yml.j2
        dest: "{{ traefik_dynamic_dir }}/{{ traefik_dynamic_tls_filename }}"
        owner: root
        group: root
        mode: "0644"

    - name: Render Traefik compose stack
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ traefik_stack_root }}/{{ traefik_compose_filename }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install Cloudflare origin certificate from variable content
      ansible.builtin.copy:
        dest: "{{ traefik_certs_dir }}/{{ traefik_origin_cert_filename }}"
        content: "{{ traefik_origin_cert_content | trim }}\n"
        owner: root
        group: root
        mode: "0644"
      when:
        - traefik_use_origin_cert | bool
        - traefik_origin_cert_content | trim | length > 0

    - name: Install Cloudflare origin private key from variable content
      ansible.builtin.copy:
        dest: "{{ traefik_certs_dir }}/{{ traefik_origin_key_filename }}"
        content: "{{ traefik_origin_key_content | trim }}\n"
        owner: root
        group: root
        mode: "0600"
      when:
        - traefik_use_origin_cert | bool
        - traefik_origin_key_content | trim | length > 0

    - name: Check for origin certificate and key files
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "{{ traefik_certs_dir }}/{{ traefik_origin_cert_filename }}"
        - "{{ traefik_certs_dir }}/{{ traefik_origin_key_filename }}"
      register: traefik_origin_cert_files
      when: traefik_use_origin_cert | bool

    - name: Validate origin certificate and key files exist when enabled
      ansible.builtin.assert:
        that:
          - item.stat.exists
        fail_msg: "Missing file required for traefik_use_origin_cert=true: {{ item.stat.path }}"
      loop: "{{ traefik_origin_cert_files.results }}"
      when: traefik_use_origin_cert | bool

    - name: Ensure shared proxy docker network exists
      community.docker.docker_network:
        name: "{{ traefik_network_name }}"
        state: present

    - name: Deploy Traefik stack via docker compose
      community.docker.docker_compose_v2:
        project_src: "{{ traefik_stack_root }}"
        files:
          - "{{ traefik_compose_filename }}"
        state: present
        pull: missing
      register: traefik_compose_result

    - name: Verify Traefik container is running
      community.docker.docker_container_info:
        name: "{{ traefik_container_name }}"
      register: traefik_container_info

    - name: Assert Traefik container health
      ansible.builtin.assert:
        that:
          - traefik_container_info.exists
          - traefik_container_info.container.State.Running | bool
        fail_msg: "Traefik container is not running as expected."

    - name: Allow Traefik firewall ports when firewall is managed here
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: "{{ traefik_firewall_ports }}"
      when: traefik_effective_manage_firewall | bool

    - name: Print Traefik setup summary
      ansible.builtin.debug:
        msg:
          - "Traefik stack deployed at {{ traefik_stack_root }}."
          - "Dashboard enabled: {{ traefik_dashboard_enable | bool }}"
          - "Origin cert mode enabled: {{ traefik_use_origin_cert | bool }}"
          - "Firewall ports managed: {{ traefik_effective_manage_firewall | bool }}"
