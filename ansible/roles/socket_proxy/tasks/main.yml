---
- name: Skip Docker socket proxy setup when disabled
  ansible.builtin.debug:
    msg: "socket_proxy_enable is false; skipping Docker socket proxy setup."
  when: not (socket_proxy_enable | bool)

- name: Deploy Docker socket proxy
  when: socket_proxy_enable | bool
  block:
    - name: Install Docker packages required for socket proxy
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-plugin
          - python3-docker
        state: present
        update_cache: true
      when: socket_proxy_install_docker | bool

    - name: Ensure docker service is enabled and running
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started

    - name: Ensure socket proxy stack directory exists
      ansible.builtin.file:
        path: "{{ socket_proxy_stack_root }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Ensure socket proxy network exists
      community.docker.docker_network:
        name: "{{ socket_proxy_network_name }}"
        state: present

    - name: Render socket proxy compose stack
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ socket_proxy_stack_root }}/{{ socket_proxy_compose_filename }}"
        owner: root
        group: root
        mode: "0644"

    - name: Deploy socket proxy stack via docker compose
      community.docker.docker_compose_v2:
        project_src: "{{ socket_proxy_stack_root }}"
        files:
          - "{{ socket_proxy_compose_filename }}"
        state: present
        pull: missing

    - name: Verify socket proxy container is running
      community.docker.docker_container_info:
        name: "{{ socket_proxy_container_name }}"
      register: socket_proxy_container_info

    - name: Assert socket proxy container health
      ansible.builtin.assert:
        that:
          - socket_proxy_container_info.exists
          - socket_proxy_container_info.container.State.Running | bool
        fail_msg: "Docker socket proxy container is not running as expected."

    - name: Print socket proxy setup summary
      ansible.builtin.debug:
        msg:
          - "Docker socket proxy deployed at {{ socket_proxy_stack_root }}."
          - "Socket proxy endpoint: {{ socket_proxy_endpoint }}"
          - "Published to host: {{ socket_proxy_publish_port | bool }}"
