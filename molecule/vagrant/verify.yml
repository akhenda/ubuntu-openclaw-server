---
- name: Verify vagrant scenario
  hosts: all
  gather_facts: false
  become: true
  vars:
    remote_project_root: /tmp/ubuntu-openclaw-server
    remote_env_file: "{{ remote_project_root }}/config/molecule-vagrant.env"
    install_log_file: /tmp/molecule-install.log
    ssh_dropin_file: /tmp/molecule-ssh/sshd_config.d/99-openclaw-hardening.conf
    admin_ssh_public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBASE64PLACEHOLDERKEYEXAMPLE1234567890 hendaz@test"
  tasks:
    - name: Read installer live run log
      ansible.builtin.slurp:
        path: "{{ install_log_file }}"
      register: install_log

    - name: Assert installer completed expected phases
      ansible.builtin.assert:
        that:
          - "'[packages] prerequisites complete' in (install_log.content | b64decode)"
          - "'[user] dual-user setup complete' in (install_log.content | b64decode)"
          - "'[tailscale] tailscale baseline complete' in (install_log.content | b64decode)"
          - "'[socket-proxy] socket proxy is enabled; edge phase will deploy docker-socket-proxy' in (install_log.content | b64decode)"
          - "'[systemd] stack lifecycle unit management complete' in (install_log.content | b64decode)"
          - "'[ssh] no sshd config changes detected' in (install_log.content | b64decode)"
          - "'[verify] VERIFY_ENABLE=false; skipping verification checks' in (install_log.content | b64decode)"
        fail_msg: "Installer log is missing expected live-run checkpoints."

    - name: Ensure admin user exists
      ansible.builtin.getent:
        database: passwd
        key: hendaz

    - name: Ensure runtime user exists
      ansible.builtin.getent:
        database: passwd
        key: openclaw

    - name: Capture admin user groups
      ansible.builtin.command:
        argv:
          - id
          - -nG
          - hendaz
      changed_when: false
      register: admin_groups

    - name: Assert admin user is in sudo group
      ansible.builtin.assert:
        that:
          - "'sudo' in (admin_groups.stdout.split())"

    - name: Capture runtime user groups
      ansible.builtin.command:
        argv:
          - id
          - -nG
          - openclaw
      changed_when: false
      register: runtime_groups

    - name: Assert runtime user is not in sudo group
      ansible.builtin.assert:
        that:
          - "'sudo' not in (runtime_groups.stdout.split())"

    - name: Read admin authorized_keys
      ansible.builtin.slurp:
        path: /home/hendaz/.ssh/authorized_keys
      register: authorized_keys

    - name: Assert admin public key is present
      ansible.builtin.assert:
        that:
          - "admin_ssh_public_key in (authorized_keys.content | b64decode)"

    - name: Read ssh hardening drop-in from sandbox path
      ansible.builtin.slurp:
        path: "{{ ssh_dropin_file }}"
      register: ssh_dropin

    - name: Assert ssh hardening policy values
      ansible.builtin.assert:
        that:
          - "'Port 1773' in (ssh_dropin.content | b64decode)"
          - "'PermitRootLogin no' in (ssh_dropin.content | b64decode)"
          - "'PasswordAuthentication no' in (ssh_dropin.content | b64decode)"
          - "'AllowUsers hendaz' in (ssh_dropin.content | b64decode)"

    - name: Check hostname contract
      ansible.builtin.command:
        argv:
          - hostnamectl
          - --static
      changed_when: false
      register: hostname_static

    - name: Assert hostname was configured from env contract
      ansible.builtin.assert:
        that:
          - "hostname_static.stdout == 'node.akhenda.net'"

    - name: Check timezone contract
      ansible.builtin.command:
        argv:
          - timedatectl
          - show
          - --property=Timezone
          - --value
      changed_when: false
      register: timezone_value

    - name: Assert timezone was configured
      ansible.builtin.assert:
        that:
          - "timezone_value.stdout == 'Africa/Nairobi'"

    - name: Verify fail2ban service is enabled
      ansible.builtin.command:
        argv:
          - systemctl
          - is-enabled
          - fail2ban
      changed_when: false
      register: fail2ban_enabled

    - name: Verify fail2ban service is active
      ansible.builtin.command:
        argv:
          - systemctl
          - is-active
          - fail2ban
      changed_when: false
      register: fail2ban_active

    - name: Assert fail2ban runtime state
      ansible.builtin.assert:
        that:
          - "fail2ban_enabled.stdout == 'enabled'"
          - "fail2ban_active.stdout == 'active'"

    - name: Verify unattended-upgrades service is enabled
      ansible.builtin.command:
        argv:
          - systemctl
          - is-enabled
          - unattended-upgrades
      changed_when: false
      register: unattended_enabled

    - name: Verify unattended-upgrades service state
      ansible.builtin.command:
        argv:
          - systemctl
          - is-active
          - unattended-upgrades
      changed_when: false
      register: unattended_active

    - name: Assert unattended-upgrades runtime state
      ansible.builtin.assert:
        that:
          - "unattended_enabled.stdout == 'enabled'"
          - "unattended_active.stdout in ['active', 'inactive']"

    - name: Ensure docker is installed
      ansible.builtin.command:
        argv:
          - docker
          - --version
      changed_when: false

    - name: Ensure Docker apt repo file exists
      ansible.builtin.stat:
        path: /etc/apt/sources.list.d/docker.list
      register: docker_repo

    - name: Assert Docker apt repo file exists
      ansible.builtin.assert:
        that:
          - docker_repo.stat.exists

    - name: Re-check config contract directly
      ansible.builtin.command:
        argv:
          - bash
          - "{{ remote_project_root }}/scripts/install.sh"
          - --check-config
          - --config
          - "{{ remote_env_file }}"
      changed_when: false

    - name: Verify tailscale package is installed
      ansible.builtin.command:
        argv:
          - dpkg-query
          - -W
          - -f=${Status}
          - tailscale
      changed_when: false
      register: tailscale_pkg

    - name: Assert tailscale package status
      ansible.builtin.assert:
        that:
          - "'install ok installed' in tailscale_pkg.stdout"

    - name: Verify tailscaled service is active
      ansible.builtin.command:
        argv:
          - systemctl
          - is-active
          - tailscaled
      changed_when: false
      register: tailscaled_active

    - name: Assert tailscaled service is active
      ansible.builtin.assert:
        that:
          - "tailscaled_active.stdout == 'active'"

    - name: Read generated edge compose file
      ansible.builtin.slurp:
        path: /opt/openclaw/edge/docker-compose.yml
      register: edge_compose

    - name: Assert socket proxy is wired in edge compose
      ansible.builtin.assert:
        that:
          - "'docker-socket-proxy:' in (edge_compose.content | b64decode)"
          - "'/var/run/docker.sock:/var/run/docker.sock:ro' in (edge_compose.content | b64decode)"

    - name: Read generated Traefik static config
      ansible.builtin.slurp:
        path: /opt/openclaw/edge/traefik/traefik.yml
      register: traefik_cfg

    - name: Assert Traefik uses socket proxy endpoint
      ansible.builtin.assert:
        that:
          - "'endpoint: \"tcp://docker-socket-proxy:2375\"' in (traefik_cfg.content | b64decode)"

    - name: Ensure sample app directory exists
      ansible.builtin.file:
        path: /opt/openclaw/apps/sample
        state: directory
        mode: "0755"

    - name: Ensure edge docker network exists for app deployment
      ansible.builtin.shell: >-
        docker network inspect openclaw-edge >/dev/null 2>&1
        || docker network create --subnet 172.30.0.0/24 openclaw-edge
      args:
        executable: /bin/bash
      changed_when: false

    - name: Create sample app Dockerfile
      ansible.builtin.copy:
        dest: /opt/openclaw/apps/sample/Dockerfile
        mode: "0644"
        content: |
          FROM nginx:alpine
          RUN printf 'sample app from molecule\n' > /usr/share/nginx/html/index.html

    - name: Deploy sample app via generated helper
      ansible.builtin.command:
        argv:
          - /opt/openclaw/bin/deploy_app.sh
          - sample
          - "80"
      changed_when: false

    - name: Read generated apps compose file
      ansible.builtin.slurp:
        path: /opt/openclaw/apps/docker-compose.yml
      register: apps_compose

    - name: Assert hub service auto-created and sample labels are correct
      ansible.builtin.assert:
        that:
          - "'hub:' in (apps_compose.content | b64decode)"
          - "'homepage.href=https://sample.example.com' in (apps_compose.content | b64decode)"
          - "'traefik.http.routers.hub.rule=' in (apps_compose.content | b64decode)"
