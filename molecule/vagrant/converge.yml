---
- name: Converge vagrant scenario (Bash installer live run)
  hosts: all
  gather_facts: true
  become: true
  vars:
    project_root: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}"
    remote_project_root: /tmp/ubuntu-openclaw-server
    remote_config_dir: "{{ remote_project_root }}/config"
    remote_env_file: "{{ remote_config_dir }}/molecule-vagrant.env"
    install_log_file: /tmp/molecule-install.log
    ssh_sandbox_dir: /tmp/molecule-ssh
    ssh_main_config: "{{ ssh_sandbox_dir }}/sshd_config"
    ssh_config_dir: "{{ ssh_sandbox_dir }}/sshd_config.d"
    ssh_dropin_file: "{{ ssh_config_dir }}/99-openclaw-hardening.conf"
    admin_ssh_public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBASE64PLACEHOLDERKEYEXAMPLE1234567890 hendaz@test"
  tasks:
    - name: Ensure remote project directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ remote_project_root }}"
        - "{{ remote_config_dir }}"
        - "{{ ssh_sandbox_dir }}"
        - "{{ ssh_config_dir }}"

    - name: Copy installer scripts to VM
      ansible.builtin.copy:
        src: "{{ project_root }}/scripts/"
        dest: "{{ remote_project_root }}/scripts/"
        mode: preserve

    - name: Write vagrant scenario config file
      ansible.builtin.copy:
        dest: "{{ remote_env_file }}"
        mode: "0644"
        content: |
          DOMAIN=example.com
          APPS_DOMAIN=example.com
          BOT_NAME=cherry
          TUNNEL_UUID=123e4567-e89b-12d3-a456-426614174000
          CF_ZONE_ID=0123456789abcdef0123456789abcdef
          CF_API_TOKEN=abcdefghijklmnopqrstuvwxyz123456
          TAILSCALE_AUTHKEY=tskey-auth-test-placeholder-0123456789abcdef
          TAILSCALE_ALLOW_PLACEHOLDER_AUTHKEY=true
          OPENCLAW_GATEWAY_TOKEN=tok_abcdefghijklmnopqrstuvwxyz
          OPENCLAW_GATEWAY_PASSWORD=StrongPass1234!
          ADMIN_USER=hendaz
          RUNTIME_USER=openclaw
          HOST_FQDN=node.akhenda.net
          SSH_PORT=1773
          ADMIN_USER_SHELL=/bin/bash
          RUNTIME_USER_SHELL=/bin/bash
          REMOVE_DEFAULT_UBUNTU_USER=false
          ADMIN_SSH_PUBLIC_KEY="{{ admin_ssh_public_key }}"
          FIREWALL_ENABLE=false
          EDGE_ENABLE=true
          EDGE_START_STACK=false
          EDGE_REQUIRE_TUNNEL_CREDENTIALS=false
          DNS_ENABLE=false
          OPENCLAW_ENABLE=false
          APPS_ENABLE=true
          APPS_SETUP_VENV=true
          APPS_START_STACK=false
          MOTD_ENABLE=false
          OH_MY_ZSH_ENABLE=false
          REPORT_ENABLE=false
          VERIFY_ENABLE=false
          VERIFY_STRICT=false
          EDGE_NETWORK_NAME=openclaw-edge
          EDGE_SUBNET=172.30.0.0/24
          TRAEFIK_IP=172.30.0.2
          CLOUDFLARED_IP=172.30.0.3
          OPENCLAW_GATEWAY_IP=172.30.0.10
          REPORT_OWNER_NAME=Joseph

    - name: Seed ssh sandbox main config
      ansible.builtin.copy:
        dest: "{{ ssh_main_config }}"
        mode: "0644"
        content: |
          Include /etc/ssh/sshd_config.d/*.conf
          Port 22

    - name: Seed ssh sandbox hardening drop-in to keep converge idempotent
      ansible.builtin.copy:
        dest: "{{ ssh_dropin_file }}"
        mode: "0644"
        content: |
          # Managed by infra-ubuntu-2404-openclaw (scripts/lib/ssh.sh)
          Port 1773
          Protocol 2
          PermitRootLogin no
          PasswordAuthentication no
          KbdInteractiveAuthentication no
          ChallengeResponseAuthentication no
          PubkeyAuthentication yes
          UsePAM yes
          PermitEmptyPasswords no
          MaxAuthTries 2
          UseDNS no
          X11Forwarding no
          AllowTcpForwarding no
          AllowAgentForwarding no
          PrintMotd no
          PrintLastLog no
          AllowUsers hendaz

    - name: Run installer live on VM
      ansible.builtin.shell: >-
        bash {{ remote_project_root }}/scripts/install.sh
        --config {{ remote_env_file }}
        --print-config
        > {{ install_log_file }} 2>&1
      args:
        executable: /bin/bash
      environment:
        SSHD_MAIN_CONFIG: "{{ ssh_main_config }}"
        SSHD_CONFIG_DIR: "{{ ssh_config_dir }}"
        SSHD_HARDENING_FILE: "{{ ssh_dropin_file }}"
      register: installer_run
      failed_when: false
      changed_when: false

    - name: Read installer log when run failed
      when: installer_run.rc != 0
      ansible.builtin.slurp:
        path: "{{ install_log_file }}"
      register: installer_failed_log

    - name: Fail with installer output when run failed
      when: installer_run.rc != 0
      ansible.builtin.fail:
        msg: |
          Installer failed with rc={{ installer_run.rc }}
          {{ installer_failed_log.content | b64decode }}
