---
dependency:
  name: galaxy

driver:
  name: vagrant

platforms:
  - name: ubuntu2404-vagrant
    box: hashicorp-education/ubuntu-24-04
    provider_name: virtualbox
    provider_options:
      memory: 2048
      cpus: 2

provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/ansible/roles
    ANSIBLE_COLLECTIONS_PATH: ${HOME}/.ansible/collections:/usr/share/ansible/collections
    ANSIBLE_LIBRARY: ${MOLECULE_PROJECT_DIRECTORY}/molecule/vagrant/library
  inventory:
    group_vars:
      all:
        base_apt_upgrade: "no"
        base_ssh_port: "22"
        base_allowed_ssh_ports:
          - "22"
        base_manage_admin_user: false
        base_remove_ubuntu_user: false
        base_fqdn: "molecule.local"
        base_configure_motd: true
        ssh_server_ports:
          - "22"
        ssh_client_port: "22"
        ssh_allow_users: "vagrant"
        openclaw_enable: false
  playbooks:
    converge: converge.yml
    verify: verify.yml

scenario:
  test_sequence:
    - destroy
    - create
    - converge
    - verify
    - destroy

verifier:
  name: ansible
