---
dependency:
  name: galaxy

driver:
  name: vagrant

platforms:
  - name: ubuntu2404-vagrant-integration
    box: hashicorp-education/ubuntu-24-04
    provider_name: virtualbox
    provider_options:
      memory: 3072
      cpus: 2
    instance_raw_config_args:
      - "vm.network 'forwarded_port', guest: 1773, host: 21773"

provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/ansible/roles
    ANSIBLE_COLLECTIONS_PATH: ${HOME}/.ansible/collections:/usr/share/ansible/collections
    ANSIBLE_LIBRARY: ${MOLECULE_PROJECT_DIRECTORY}/molecule/vagrant/library
  inventory:
    group_vars:
      all:
        base_apt_upgrade: "no"
        base_ssh_port: "1773"
        base_allowed_ssh_ports:
          - "1773"
        base_manage_admin_user: false
        base_remove_ubuntu_user: false
        base_fqdn: "integration.molecule.local"
        base_configure_motd: true

        ssh_server_ports:
          - "1773"
        ssh_client_port: "1773"
        ssh_allow_users: "vagrant"

        openclaw_enable: false
        cloudflare_enable: false

        socket_proxy_enable: true
        socket_proxy_compose_idempotence_mode: true
        traefik_enable: true
        traefik_admin_user: "vagrant"
        traefik_domain: "example.invalid"
        traefik_dashboard_enable: false

        homepage_enable: true
        homepage_domain: "example.invalid"
        homepage_host: "hub.example.invalid"

        os_sysctl_enabled: false
        os_chmod_home_folders: false

        oh_my_zsh_enable: true
        oh_my_zsh_target_user: "vagrant"

        verify_allow_legacy_ssh_port: false
        verify_expect_legacy_ssh_deny: true
        verify_expect_socket_proxy: true
        verify_expect_traefik_proxy_endpoint: true
        verify_expect_homepage_proxy_endpoint: true
        verify_expect_oh_my_zsh: true
        verify_oh_my_zsh_user: "vagrant"
        verify_ansible_host: "127.0.0.1"
        verify_ansible_port: "21773"
  playbooks:
    converge: converge.yml
    verify: verify.yml

scenario:
  test_sequence:
    - destroy
    - create
    - converge
    - idempotence
    - verify
    - destroy

verifier:
  name: ansible
