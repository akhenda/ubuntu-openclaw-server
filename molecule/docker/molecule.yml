---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: ubuntu2404-docker
    image: ubuntu:24.04
    pre_build_image: true
    command: /bin/sh -c "while true; do sleep 3600; done"

provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/ansible/roles
    ANSIBLE_COLLECTIONS_PATH: ${HOME}/.ansible/collections:/usr/share/ansible/collections
  config_options:
    defaults:
      interpreter_python: auto_silent
  playbooks:
    converge: converge.yml
    verify: verify.yml

scenario:
  test_sequence:
    - destroy
    - create
    - converge
    - verify
    - destroy

verifier:
  name: ansible
