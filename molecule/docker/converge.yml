---
- name: Converge docker scenario (base role only)
  hosts: all
  gather_facts: false
  become: false
  vars:
    base_apt_upgrade: "no"
    base_manage_firewall: false
    base_install_fail2ban: false
    base_set_timezone: false
    openclaw_enable: false
  pre_tasks:
    - name: Ensure python3 exists in test container
      ansible.builtin.raw: |
        test -x /usr/bin/python3 || (apt-get update -y && apt-get install -y python3)
      changed_when: false

    - name: Gather facts after python bootstrap
      ansible.builtin.setup:

  roles:
    - role: base
